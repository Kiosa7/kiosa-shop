<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Servicio – Kiosa Shop</title>
    <meta name="description" content="Estado en tiempo real de los sistemas de Kiosa Shop.">
    <link rel="stylesheet" href="index.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
    <style>
        .status-content {
            padding: 160px 0 100px;
            background: var(--bg-primary);
            min-height: 80vh;
        }

        .status-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .status-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .status-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .overall-status {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-online {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .status-item {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-subtle);
        }

        .status-item .name {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-item .dots {
            display: flex;
            gap: 4px;
        }

        .status-dot {
            width: 4px;
            height: 16px;
            background: var(--success);
            border-radius: 2px;
            opacity: 0.8;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }
    </style>
</head>

<body>

    <canvas id="particles-canvas"></canvas>

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img class="logo-img" src="logo.svg" alt="Kiosa Shop Logo">
                <span>Kiosa</span>
                <span>Shop</span>
            </a>
        </div>
    </nav>

    <main class="status-content">
        <div class="status-container">
            <div class="status-header reveal">
                <h1>Estado del Sistema</h1>
                <div class="overall-status">
                    <span class="pulse"></span>
                    <span class="status-text">Todos los sistemas están operativos</span>
                    <span class="status-badge status-online">Operativo</span>
                </div>
            </div>

            <div class="status-list">
                <div class="status-item reveal" style="transition-delay: 0.1s;">
                    <span class="name">Sitio Web Principal</span>
                    <div class="dots">
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                    </div>
                    <span class="status-badge status-online">100%</span>
                </div>
                <div class="status-item reveal" style="transition-delay: 0.2s;">
                    <span class="name">Pasarela de Pagos</span>
                    <div class="dots">
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                    </div>
                    <span class="status-badge status-online">99.9%</span>
                </div>
                <div class="status-item reveal" style="transition-delay: 0.3s;">
                    <span class="name">Panel de Afiliados</span>
                    <div class="dots">
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                    </div>
                    <span class="status-badge status-online">100%</span>
                </div>
                <div class="status-item reveal" style="transition-delay: 0.4s;">
                    <span class="name">API de Productos</span>
                    <div class="dots">
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                        <div class="status-dot"></div>
                    </div>
                    <span class="status-badge status-online">100%</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Kiosa Shop. Sistemas monitoreados 24/7.</p>
                <a href="index.html"
                    style="margin-top: 10px; display: inline-block; color: var(--primary-500);">Regresar al inicio</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
